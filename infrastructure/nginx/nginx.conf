worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    
    # --- UPSTREAMS ---
    upstream frontend       { server backoffice-frontend:3000; }
    upstream rust_api       { server backoffice-api:8080; }
    upstream nakama_api     { server nakama:7350; }
    upstream nakama_console { server nakama:7351; }
    upstream analytics      { server aptabase:8080; }
    upstream rauthy         { server rauthy:8443; }
    upstream mailcrab       { server mailcrab:1080; }
    upstream oauth2_proxy   { server oauth2-proxy:4180; } # Наш новый страж

    # Базовый HTTP -> HTTPS редирект для всех поддоменов
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ==============================================================================
    # 1. ПУБЛИЧНАЯ ЗОНА (Доступна всем)
    # ==============================================================================

    # FRONTEND (React SPA)
    server {
        listen 443 ssl;
        server_name app.*; # app.localhost, app.tangleweavestudios.com
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;


        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # BACKOFFICE API (Авторизация проверяется внутри Rust)
    server {
        listen 443 ssl;
        server_name api.*;
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://rust_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ==============================================================================
    # RAUTHY SSO (Точка входа) - СТРОГО БЕЗ OAUTH2-PROXY
    # ==============================================================================
    server {
        listen 443 ssl;
        server_name auth.*;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            # Трафик идет напрямую в контейнер rauthy
            proxy_pass https://rauthy;

            # Обязательные заголовки для корректной работы OIDC
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Выключаем проверку сертификата между Nginx и Rauthy внутри Docker-сети
            proxy_ssl_verify off;
        }
    }

    # NAKAMA GAME API (Порт 7350 - Игровой трафик из Godot)
    server {
        listen 443 ssl;
        server_name game.*;
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://nakama_api;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ==============================================================================
    # 2. ЗАЩИЩЕННАЯ ЗОНА (Только после входа через Rauthy)
    # ==============================================================================

    # NAKAMA CONSOLE (Порт 7351)
    server {
        listen 443 ssl;
        server_name console.*;
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Внутренний роут для проверки куки
        location /oauth2/ {
            proxy_pass http://oauth2_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
        }

        location / {
            # Приказ Nginx: "Спроси разрешения у oauth2-proxy"
            auth_request /oauth2/auth;
            # Если нет куки (401) - отправить на страницу логина
            error_page 401 = /oauth2/sign_in;

            proxy_pass http://nakama_console;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # APTABASE ANALYTICS
    server {
        listen 443 ssl;
        server_name analytics.*;
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location /oauth2/ { proxy_pass http://oauth2_proxy; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Scheme $scheme; proxy_set_header X-Auth-Request-Redirect $request_uri; }

        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/sign_in;
            proxy_pass http://analytics;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 443 ssl;
        server_name mail.tangleweave.local;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            # Защита через прокси для основного интерфейса
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/sign_in;

            proxy_pass http://mailcrab:1080;
            proxy_set_header Host $host;
        }

        # Специальный путь для WebSocket MailCrab
        location /ws {
            proxy_pass http://mailcrab:1080;
            proxy_http_version 1.1;

            # Проброс заголовков Upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Увеличиваем таймауты, чтобы сокет не засыпал
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }

        # Не забудьте про сам путь oauth2
        location /oauth2/ {
            proxy_pass http://oauth2-proxy:4180;
            proxy_set_header Host $host;
        }
    }
}