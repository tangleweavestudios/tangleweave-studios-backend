worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    
    # --- UPSTREAMS ---
    upstream frontend       { server backoffice-frontend:3000; }
    upstream rust_api       { server backoffice-api:8080; }
    upstream nakama_api     { server nakama:7350; }
    upstream nakama_console { server nakama:7351; }
    upstream analytics      { server aptabase:8080; }
    upstream rauthy         { server rauthy:8443; }
    upstream oauth2_proxy   { server oauth2-proxy:4180; } # Наш новый страж

    # Базовый HTTP -> HTTPS редирект для всех поддоменов
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ==============================================================================
    # 1. ПУБЛИЧНАЯ ЗОНА (Доступна всем)
    # ==============================================================================

    # FRONTEND (React SPA)
    server {
        listen 443 ssl;
        server_name app.*; # app.localhost, app.tangleweavestudios.com
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;


        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # BACKOFFICE API (Авторизация проверяется внутри Rust)
    server {
        listen 443 ssl;
        server_name api.*;
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://rust_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ==============================================================================
    # RAUTHY SSO (Точка входа) - СТРОГО БЕЗ OAUTH2-PROXY
    # ==============================================================================
    server {
        listen 443 ssl;
        server_name auth.*;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            # Трафик идет напрямую в контейнер rauthy
            proxy_pass https://rauthy;

            # Обязательные заголовки для корректной работы OIDC
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Выключаем проверку сертификата между Nginx и Rauthy внутри Docker-сети
            proxy_ssl_verify off;
        }
    }

    # NAKAMA GAME API (Порт 7350 - Игровой трафик из Godot)
    server {
        listen 443 ssl;
        server_name game.*;
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://nakama_api;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ==============================================================================
    # 2. ЗАЩИЩЕННАЯ ЗОНА (Только после входа через Rauthy)
    # ==============================================================================

    # NAKAMA CONSOLE (Порт 7351)
    server {
        listen 443 ssl;
        server_name console.*;
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Внутренний роут для проверки куки
        location /oauth2/ {
            proxy_pass http://oauth2_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Scheme $scheme;
        }

        location / {
            # Приказ Nginx: "Спроси разрешения у oauth2-proxy"
            auth_request /oauth2/auth;
            # Если нет куки (401) - отправить на страницу логина
            error_page 401 = /oauth2/sign_in;

            proxy_pass http://nakama_console;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # APTABASE ANALYTICS
    server {
        listen 443 ssl;
        server_name analytics.*;
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 1. ОТКРЫТЫЙ ПУТЬ ДЛЯ ИГРЫ (Без SSO)
        location /api/v0/events {
            proxy_pass http://analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # 2. ПУТЬ ДЛЯ ПРОКСИ
        location /oauth2/ {
            proxy_pass http://oauth2_proxy;
            proxy_set_header Host $host;
        }

        # 3. ЗАЩИЩЕННЫЙ ДАШБОРД (Для вас)
        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/sign_in;

            # 1. ЗАХВАТЫВАЕМ данные из ответа OAuth2 Proxy
            auth_request_set $user   $upstream_http_x_auth_request_user;
            auth_request_set $email  $upstream_http_x_auth_request_email;

            # 2. ПРОБРАСЫВАЕМ их в Aptabase
            proxy_set_header X-Forwarded-User  $user;
            proxy_set_header X-Forwarded-Email $email;

            proxy_pass http://analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 443 ssl;
        server_name mail.*;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Указываем Nginx использовать встроенный DNS Docker'а
        resolver 127.0.0.11 valid=30s;

        location /ws {
            # Записываем адрес в переменную. Это заставит Nginx искать хост не при старте, а при запросе!
            set $mailcrab_backend http://mailcrab:1080;
            proxy_pass $mailcrab_backend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /oauth2/ {
            proxy_pass http://oauth2_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Scheme $scheme;
        }

        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/sign_in;

            # Та же магия с переменной для основного интерфейса
            set $mailcrab_backend http://mailcrab:1080;
            proxy_pass $mailcrab_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}