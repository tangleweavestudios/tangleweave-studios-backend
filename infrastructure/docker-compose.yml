services:
  # ==========================================================================
  # POSTGRESQL CLUSTER
  # ==========================================================================
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tangleweave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RAUTHY_DB_PASSWORD: ${RAUTHY_DB_PASSWORD}
      NAKAMA_DB_PASSWORD: ${NAKAMA_DB_PASSWORD}
      APTABASE_DB_PASSWORD: ${APTABASE_DB_PASSWORD}
      BACKOFFICE_DB_PASSWORD: ${BACKOFFICE_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/10-init-databases.sh:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tangleweave"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=200

  # ==========================================================================
  # MAILCRAB (SMTP for Development)
  # ==========================================================================
  mailcrab:
    image: marlonb/mailcrab:latest
    restart: unless-stopped
    ports:
      # Локально открываем порт 1080. На сервере он будет доступен только через туннель или закрыт.
      - "${MAILCRAB_PORT:-1080}:1080"
    networks:
      - internal
    profiles:
      - dev # Mailcrab будет запускаться только локально или в test, если указать этот профиль
      - local

  # ==========================================================================
  # RAUTHY (OIDC Provider)
  # ==========================================================================
  rauthy:
    image: ghcr.io/sebadob/rauthy:0.35.1
    restart: unless-stopped
    environment:
      - SMTP_URL=${SMTP_URL:-mailcrab}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-mailcrab}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-mailcrab}
      - SMTP_FROM=${SMTP_FROM:-admin@localhost.de}
      - SMTP_DANGER_INSECURE=${SMTP_DANGER_INSECURE:-true}
      - PG_PASSWORD=${RAUTHY_DB_PASSWORD}
      - BOOTSTRAP_ADMIN_PASSWORD_PLAIN=${BOOTSTRAP_ADMIN_PASSWORD_PLAIN}
    volumes:
      - rauth_data:/app/data
      - ./rauthy/config.${APP_ENV}.toml:/app/config.toml:ro
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  # ==========================================================================
  # NAKAMA (Game Server)
  # ==========================================================================
  nakama:
    image: heroiclabs/nakama:3.25.0
    restart: unless-stopped
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address nakama:${NAKAMA_DB_PASSWORD}@db:5432/nakama_db &&
        exec /nakama/nakama --name tangleweave --database.address nakama:${NAKAMA_DB_PASSWORD}@db:5432/nakama_db --socket.port 7350 --console.port 7351 --runtime.js_entrypoint auth_rauthy.js
    environment:
      - NAKAMA_LICENSE_KEY=${NAKAMA_LICENSE_KEY:-}
      - RAUTHY_ISSUER=${RAUTHY_ISSUER}
      - RAUTHY_JWKS_URL=${RAUTHY_JWKS_URL}
      - RAUTHY_CLIENT_ID=${RAUTHY_CLIENT_ID}
    volumes:
      - ./nakama/modules:/nakama/data/modules
      - nakama_data:/nakama/storage
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  # ==========================================================================
  # APTABASE (Self-hosted Analytics)
  # ==========================================================================
  aptabase_events_db:
    image: clickhouse/clickhouse-server:23.8.16.16-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: tangleweave
      CLICKHOUSE_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - aptabase_events_data:/var/lib/clickhouse
    networks:
      - internal

  aptabase:
    image: ghcr.io/aptabase/aptabase:main
    restart: unless-stopped
    environment:
      DATABASE_URL: Server=db;Port=5432;User Id=aptabase;Password=${APTABASE_DB_PASSWORD};Database=aptabase_db
      CLICKHOUSE_URL: Host=aptabase_events_db;Port=8123;Username=tangleweave;Password=${POSTGRES_PASSWORD}
      AUTH_SECRET: ${APABASE_AUTH_SECRET}
      BASE_URL: ${APTABASE_BASE_URL:-http://localhost:3000}
    volumes:
      - aptabase_data:/app/data
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      aptabase_events_db:
        condition: service_started

  # ==========================================================================
  # BACKOFFICE API (Rust/Axum)
  # ==========================================================================
  backoffice-api:
    build:
      context: ../
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://backoffice:${BACKOFFICE_DB_PASSWORD}@db:5432/backoffice_db
      - BACKOFFICE_ADMIN_KEY=${BACKOFFICE_ADMIN_KEY}
      - OIDC_ISSUER=${OIDC_ISSUER}
      - JWKS_URL=${JWKS_URL}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - NAKAMA_URL=http://nakama:7350
      - NAKAMA_API_KEY=${NAKAMA_API_KEY}
      - PAYMENT_WEBHOOK_SECRET=${PAYMENT_WEBHOOK_SECRET}
      - RUST_LOG=info
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  # ==========================================================================
  # BACKOFFICE FRONTEND (React SPA)
  # ==========================================================================
  backoffice-frontend:
    build:
      context: ../backoffice/frontend
      dockerfile: Dockerfile
      args:
        - VITE_OIDC_AUTHORITY=${VITE_OIDC_AUTHORITY:-/auth/v1}
        - VITE_OIDC_CLIENT_ID=${VITE_OIDC_CLIENT_ID:-backoffice-admin}
    restart: unless-stopped
    networks:
      - internal

  # ==========================================================================
  # NGINX (API Gateway)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      internal:
        aliases:
          # Внутренний DNS Docker теперь знает этот домен!
          - auth.tangleweave.local
    ports:
      # Локально: 80 и 443. На сервере Synology мы отключим биндинг портов,
      # чтобы избежать конфликтов (трафик пойдет через Cloudflare Tunnel)
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      - backoffice-frontend
      - backoffice-api
      - rauthy
      - nakama

  # ==========================================================================
  # OAUTH2 PROXY (SSO Gateway для внутренних инструментов)
  # ==========================================================================
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    command: --code-challenge-method=S256
    environment:
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_OIDC_ISSUER_URL=${OIDC_ISSUER} # Ссылка на ваш Rauthy
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID:-tangleweave-internal}
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
      # Wildcard куки: залогинившись в mail.*, вы будете авторизованы и в analytics.*
      - OAUTH2_PROXY_COOKIE_DOMAINS=${OAUTH2_PROXY_COOKIE_DOMAIN}
      - OAUTH2_PROXY_WHITELIST_DOMAINS=${OAUTH2_PROXY_COOKIE_DOMAIN}
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_UPSTREAMS=file:///dev/null # Роутинг делает Nginx, прокси только проверяет
      - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
      # ДОБАВИТЬ ЭТУ СТРОКУ (Разрешает локальные SSL сертификаты):
      - OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY=true
    networks:
        internal:
          aliases:
            - auth.tangleweave.local
            - app.tangleweave.local
    depends_on:
      - rauthy


  # ==========================================================================
  # CLOUDFLARE TUNNEL (Production / Test Proxy)
  # ==========================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    networks:
      - internal
    # Запускается только если есть токен (для локалки он не нужен)
    profiles:
      - cloudflare

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  rauth_data:
  nakama_data:
  aptabase_data:
  aptabase_events_data: