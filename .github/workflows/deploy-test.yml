name: Deploy Test Environment

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to Synology NAS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NAS_IP }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_PORT }} # Обычно 22
          script: |
            cd /volume1/docker/tangleweave-test
            
            # Обновляем код из ветки dev
            git fetch --all
            git checkout dev
            git pull origin dev
            
            # Создаем .env файл из секретов GitHub
            echo "${{ secrets.ENV_TEST }}" > .env
            
            # Запускаем контейнеры с изоляцией по имени проекта (-p test)
            # Указываем профиль cloudflare для туннеля
            sudo docker compose -p tangleweave-test --profile cloudflare up -d --build